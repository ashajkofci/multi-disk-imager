name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet restore MultiDiskImager.sln --locked-mode
      - run: dotnet build MultiDiskImager.sln --configuration Release --no-restore
      - run: dotnet test tests/MultiDiskImager.Core.Tests/MultiDiskImager.Core.Tests.csproj --configuration Release --no-build
