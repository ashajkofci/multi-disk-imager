name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      msix_version: ${{ steps.version.outputs.msix_version }}
    steps:
      - id: version
        shell: bash
        run: |
          tag='${{ github.ref_name }}'
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be SemVer, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then echo "prerelease=true" >> "$GITHUB_OUTPUT"; else echo "prerelease=false" >> "$GITHUB_OUTPUT"; fi
          numeric_version="${version%%[-+]*}"
          IFS=. read -r major minor patch <<< "$numeric_version"
          for component in "$major" "$minor" "$patch"; do
            if (( 10#$component > 65535 )); then
              echo "MSIX version components must not exceed 65535." >&2
              exit 1
            fi
          done
          echo "msix_version=$major.$minor.$patch.0" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
            platform: windows
            arch: x64
          - runner: macos-15-intel
            rid: osx-x64
            platform: macos
            arch: x64
          - runner: macos-15
            rid: osx-arm64
            platform: macos
            arch: arm64
          - runner: ubuntu-latest
            rid: linux-x64
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet restore src/MultiDiskImager.App/MultiDiskImager.App.csproj --locked-mode
      - name: Publish self-contained single file
        shell: bash
        run: >-
          dotnet publish src/MultiDiskImager.App/MultiDiskImager.App.csproj
          --configuration Release --runtime ${{ matrix.rid }} --self-contained true --no-restore
          -p:Version=${{ needs.validate.outputs.version }}
          -p:InformationalVersion=${{ needs.validate.outputs.version }}
          -p:Repository=${{ github.repository }}
          --output publish
      - name: Package Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          $packageRoot = Join-Path $env:RUNNER_TEMP 'bnovate-multi-disk-imager-msix'
          try {
            $makeAppx = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction Stop |
              Sort-Object { [version]$_.Directory.Parent.Name } | Select-Object -Last 1
            if ($null -eq $makeAppx) {
              throw 'MakeAppx was not found on the Windows runner.'
            }

            $iscc = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($null -eq $iscc) {
              throw 'Inno Setup Compiler was not found on the Windows runner.'
            }

            $executable = (Resolve-Path 'publish/MultiDiskImager.exe').Path
            $artifactDirectory = (New-Item -ItemType Directory -Force artifacts).FullName
            $installerIcon = (Resolve-Path 'src/MultiDiskImager.App/Assets/AppIcon.ico').Path

            $portableExecutable = "artifacts/bnovate-multi-disk-imager-${{ needs.validate.outputs.version }}-windows-x64.exe"
            Copy-Item $executable $portableExecutable

            & $iscc "/DAppVersion=${{ needs.validate.outputs.version }}" "/DNumericVersion=${{ needs.validate.outputs.msix_version }}" "/DSourceExe=$executable" "/DOutputDir=$artifactDirectory" "/DIconFile=$installerIcon" packaging/windows/installer.iss
            if ($LASTEXITCODE -ne 0) {
              throw "Inno Setup failed with exit code $LASTEXITCODE."
            }
            $installer = Join-Path $artifactDirectory "bnovate-multi-disk-imager-${{ needs.validate.outputs.version }}-windows-x64-setup.exe"
            if (-not (Test-Path $installer)) {
              throw "Inno Setup did not create the expected installer: $installer"
            }

            New-Item -ItemType Directory -Force (Join-Path $packageRoot 'Assets') | Out-Null
            Copy-Item $executable (Join-Path $packageRoot 'MultiDiskImager.exe')
            Copy-Item packaging/windows/Assets/*.png (Join-Path $packageRoot 'Assets')

            $manifest = Get-Content packaging/windows/AppxManifest.xml.template -Raw
            $manifest = $manifest.Replace('__VERSION__', '${{ needs.validate.outputs.msix_version }}')
            Set-Content (Join-Path $packageRoot 'AppxManifest.xml') $manifest -Encoding utf8

            $msix = "artifacts/bnovate-multi-disk-imager-${{ needs.validate.outputs.version }}-windows-x64.msix"
            & $makeAppx.FullName pack /v /h SHA256 /d $packageRoot /p $msix /o
            if ($LASTEXITCODE -ne 0) {
              throw "MakeAppx failed with exit code $LASTEXITCODE."
            }
          }
          finally {
            if (Test-Path $packageRoot) {
              Remove-Item -Recurse -Force $packageRoot
            }
          }
      - name: Package macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: bash scripts/package-macos.sh publish '${{ needs.validate.outputs.version }}' '${{ matrix.arch }}' artifacts
      - name: Package Linux executable
        if: matrix.platform == 'linux'
        shell: bash
        run: bash scripts/package-linux.sh publish '${{ needs.validate.outputs.version }}' '${{ matrix.arch }}' artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: bnovate-multi-disk-imager-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    needs: [validate, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bnovate-multi-disk-imager-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums and release manifest
        working-directory: artifacts
        shell: bash
        run: |
          sha256sum bnovate-multi-disk-imager-* > SHA256SUMS.txt
          jq -n \
            --arg version '${{ needs.validate.outputs.version }}' \
            --arg tag '${{ github.ref_name }}' \
            --arg repository '${{ github.repository }}' \
            '{version:$version, tag:$tag, artifacts:[inputs]}' \
            < <(for file in bnovate-multi-disk-imager-*; do
              jq -n --arg name "$file" --arg url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$file" '{name:$name,url:$url}'
            done) > release-manifest.json
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create '${{ github.ref_name }}' artifacts/*
          --repo '${{ github.repository }}'
          --title 'bNovate Multi Disk Imager ${{ needs.validate.outputs.version }}'
          --generate-notes
          ${{ needs.validate.outputs.prerelease == 'true' && '--prerelease' || '' }}
